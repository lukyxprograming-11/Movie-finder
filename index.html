<html lang="cz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="movie_css.css">
    <title>Movie Finder</title>
</head>
<body>
    <main class="main">

        <header class="header">

            <div class="logo"> 
                <h1>Movie Finder</h1>
            </div>

            <div class="intro">
                <p>Vyhledejte film a zobrazte si podrobné informace během několika sekund.</p>

            </div>        
        </header>

        <section class="search-section">

            <div class="primary-controls">

                <input id="search-input" type="text" class="search-input">
                <button id="search-button" class="search-button">hledat</button>


            </div>

            <div class="secondary-controls">



            </div>



        </section>

        <section id="result-section" class="result-section">

                <div id="result-content" class="result-content">



                    
                </div>


        </section>

        <section id="home-section" class="home-section">
                 <div id="home-content" class="home-content">




                 </div>

        </section>


        <div id="overlay" class="overlay">

            <div id="backdrop" class="backdrop"></div>

            <div id="modal" class="modal"></div>    


        </div>



    </main>


    <script src="moviefinder.js"></script>
</body>
</html>
